<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>影视人物人格测试</title>
  <link rel="stylesheet" href="style.css" />

  <!-- ═══════════════════════════════════════════
       GOOGLE ANALYTICS 4
       替换 GA_MEASUREMENT_ID 为你的 G-XXXXXXXXXX
       在 analytics.google.com → 管理 → 数据流 里找
  ════════════════════════════════════════════ -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'GA_MEASUREMENT_ID', { send_page_view: true });
  </script>
</head>
<body>

  <!-- ═══════════════════════════════════════════
       STAGE 1 · HOME PAGE
  ════════════════════════════════════════════ -->
  <section id="stage-home" class="stage active">
    <div class="cinema-scanlines"></div>

    <div class="home-content">
      <div class="film-badge">MBTI × CINEMA</div>

      <h1 class="home-title">
        <span class="title-line">你是哪个</span>
        <span class="title-line highlight">影视角色</span>
        <span class="title-line">的人格？</span>
      </h1>

      <p class="home-sub">16道题，揭开你与银幕人物的灵魂共鸣</p>

      <div class="home-meta">
        <span>🎬 16题</span>
        <span>⏱ 约3分钟</span>
        <span>🎭 20+角色</span>
      </div>

      <button class="btn-start" id="btn-start">
        <span class="btn-inner">
          <span class="btn-icon">▶</span>
          开始测试
        </span>
        <span class="btn-flicker"></span>
      </button>

      <div class="gender-select" id="gender-select">
        <p class="gender-label">选择你的性别，匹配更精准的角色</p>
        <div class="gender-buttons">
          <button class="btn-gender" data-gender="male">
            <span class="gender-icon">♂</span>男
          </button>
          <button class="btn-gender" data-gender="female">
            <span class="gender-icon">♀</span>女
          </button>
        </div>
      </div>
    </div>

    <div class="home-reel reel-left">
      <div class="reel-strip"></div>
    </div>
    <div class="home-reel reel-right">
      <div class="reel-strip"></div>
    </div>
  </section>


  <!-- ═══════════════════════════════════════════
       STAGE 2 · QUIZ
  ════════════════════════════════════════════ -->
  <section id="stage-quiz" class="stage">
    <div class="cinema-scanlines"></div>

    <!-- Film strip progress bar -->
    <div class="progress-wrap">
      <div class="film-strip" id="film-strip">
        <!-- sprocket holes + filled frames generated by JS -->
      </div>
      <div class="progress-label">
        <span id="progress-current">1</span> / <span id="progress-total">16</span>
      </div>
    </div>

    <!-- Question card -->
    <div class="quiz-card" id="quiz-card">
      <div class="card-tape card-tape-left"></div>
      <div class="card-tape card-tape-right"></div>

      <div class="question-number" id="question-number">Q01</div>
      <p class="question-text" id="question-text">
        <!-- 题目文本由 JS 填充 -->
        题目将在这里显示
      </p>
    </div>

    <!-- Answer options -->
    <div class="answers" id="answers">
      <!-- 选项由 JS 生成 -->
      <button class="btn-answer placeholder">A &nbsp; 选项示例 A</button>
      <button class="btn-answer placeholder">B &nbsp; 选项示例 B</button>
    </div>

    <!-- Nav -->
    <div class="quiz-nav">
      <button class="btn-back" id="btn-back">← 上一题</button>
    </div>
  </section>


  <!-- ═══════════════════════════════════════════
       STAGE 3 · LOADING
  ════════════════════════════════════════════ -->
  <section id="stage-loading" class="stage">
    <div class="cinema-scanlines"></div>

    <div class="loading-content">
      <div class="projector-wrap">
        <div class="projector-beam"></div>
        <div class="projector-body">
          <div class="proj-lens"></div>
          <div class="proj-reel top-reel"></div>
          <div class="proj-reel bot-reel"></div>
        </div>
      </div>

      <p class="loading-title">正在分析你的影视人格……</p>

      <div class="loading-bar-wrap">
        <div class="loading-bar" id="loading-bar"></div>
      </div>

      <p class="loading-hint" id="loading-hint">对照角色数据库…</p>
    </div>
  </section>


  <!-- ═══════════════════════════════════════════
       STAGE 4 · RESULT
  ════════════════════════════════════════════ -->
  <section id="stage-result" class="stage">
    <div class="cinema-scanlines"></div>

    <div class="result-content">
      <!-- Spotlight -->
      <div class="spotlight"></div>

      <!-- Character reveal -->
      <div class="result-poster-wrap">
        <div class="result-poster" id="result-poster">
          <!-- character image -->
          <img id="result-img" src="" alt="角色图片" />
          <div class="poster-vignette"></div>
        </div>
        <div class="poster-label" id="poster-label">— 未知角色 —</div>
      </div>

      <!-- MBTI type badge -->
      <div class="mbti-badge" id="mbti-badge">XXXX</div>

      <!-- Character name -->
      <h2 class="result-name" id="result-name">角色名称</h2>
      <p class="result-from" id="result-from">《作品名》</p>

      <!-- Description -->
      <div class="result-desc-card">
        <p class="result-desc" id="result-desc">
          角色简介将显示在这里。
        </p>
      </div>

      <!-- Trait bars -->
      <div class="trait-bars" id="trait-bars">
        <!-- generated by JS: E/I, S/N, T/F, J/P -->
      </div>

      <!-- Action buttons -->
      <div class="result-actions">
        <button class="btn-share" id="btn-share">分享结果</button>
        <button class="btn-retry" id="btn-retry">重新测试</button>
      </div>

      <!-- Related characters -->
      <div class="related-wrap">
        <h3 class="related-title">同类型角色</h3>
        <div class="related-list" id="related-list">
          <!-- cards generated by JS -->
        </div>
      </div>
    </div>
  </section>


  <script src="script.js"></script>
</body>
</html>
